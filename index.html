<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Summercourt Academy — School Holiday Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #eef0f8;
      color: #1a202c;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #4455B7;
      color: white;
      padding: 1.5rem 1.25rem 1.25rem;
      text-align: center;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.01em; }
    header .subtitle { font-size: 0.875rem; opacity: 0.75; margin-top: 0.25rem; }
    .term-badge {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.3rem 0.9rem;
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    /* ── Status messages ── */
    .status-msg {
      text-align: center;
      padding: 2rem 1.25rem;
      font-size: 0.88rem;
      color: #607B88;
    }
    .status-msg.error { color: #c53030; }
    .spinner {
      display: inline-block;
      width: 1.2rem;
      height: 1.2rem;
      border: 2px solid #dde0f5;
      border-top-color: #4455B7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Countdown section ── */
    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #607B88;
      margin-bottom: 0.75rem;
    }

    .countdowns {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.75rem;
      padding: 1.25rem;
    }

    .countdown-card {
      background: white;
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      box-shadow: 0 1px 4px rgba(68,85,183,0.1);
      border-left: 4px solid #D9D9D9;
      position: relative;
      overflow: hidden;
    }
    .countdown-card.holiday      { border-left-color: #518FF5; }
    .countdown-card.inset        { border-left-color: #607B88; }
    .countdown-card.bank-holiday { border-left-color: #4455B7; }
    .countdown-card.closure      { border-left-color: #2299dd; }
    .countdown-card.ongoing      { border-left-color: #2299dd; }

    .card-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }
    .holiday      .card-label { color: #3a6bb5; }
    .inset        .card-label { color: #4a5f6b; }
    .bank-holiday .card-label { color: #4455B7; }
    .closure      .card-label { color: #1a7aaa; }
    .ongoing      .card-label { color: #1a7aaa; }

    .card-name { font-size: 1rem; font-weight: 700; margin-bottom: 0.2rem; line-height: 1.3; }
    .card-date { font-size: 0.78rem; color: #607B88; margin-bottom: 0.6rem; }

    .card-countdown {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }
    .holiday      .card-countdown { color: #518FF5; }
    .inset        .card-countdown { color: #607B88; }
    .bank-holiday .card-countdown { color: #4455B7; }
    .closure      .card-countdown { color: #2299dd; }
    .ongoing      .card-countdown { color: #2299dd; }

    .card-unit { font-size: 0.75rem; color: #607B88; font-weight: 500; }

    /* ── Full list ── */
    .list-section {
      padding: 0 1.25rem 1.5rem;
    }

    .term-group { margin-bottom: 1.5rem; }
    .term-heading {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4455B7;
      padding: 0.4rem 0.6rem;
      background: #dde0f5;
      border-radius: 6px;
      margin-bottom: 0.5rem;
    }

    .event-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: white;
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      margin-bottom: 0.35rem;
      box-shadow: 0 1px 3px rgba(68,85,183,0.07);
      transition: opacity 0.2s;
    }
    .event-row.past { opacity: 0.4; }

    .event-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .holiday       .event-dot { background: #518FF5; }
    .inset         .event-dot { background: #607B88; }
    .bank-holiday  .event-dot { background: #4455B7; }
    .closure       .event-dot { background: #2299dd; }

    .event-info { flex: 1; min-width: 0; }
    .event-name { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-dates { font-size: 0.75rem; color: #607B88; margin-top: 0.1rem; }

    .event-badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .holiday      .event-badge { background: #ddeafd; color: #3a6bb5; }
    .inset        .event-badge { background: #dde3e7; color: #4a5f6b; }
    .bank-holiday .event-badge { background: #dde0f5; color: #4455B7; }
    .closure      .event-badge { background: #cceaf9; color: #1a7aaa; }

    .today-marker {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      color: #518FF5;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.35rem;
      padding-left: 0.15rem;
    }
    .today-marker::before, .today-marker::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #b8cdf9;
    }

    details.past-events { margin-bottom: 0.35rem; }
    details.past-events summary {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #607B88;
      cursor: pointer;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      list-style: none;
      user-select: none;
    }
    details.past-events summary::-webkit-details-marker { display: none; }
    details.past-events summary::before {
      content: '▶';
      font-size: 0.6rem;
      transition: transform 0.2s;
    }
    details.past-events[open] summary::before { transform: rotate(90deg); }
    details.past-events summary:hover { background: #dde0f5; color: #4455B7; }

    footer {
      text-align: center;
      font-size: 0.72rem;
      color: #a0aec0;
      padding: 1rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Summercourt Academy</h1>
  <div class="subtitle" id="today-display"></div>
  <div class="term-badge" id="term-label"> </div>
</header>

<div id="countdowns-wrap"></div>
<div id="list-wrap"></div>

<footer>
  Data sourced live from <a href="https://www.summercourtacademy.org/calendar" target="_blank" style="color:#a0aec0;">summercourtacademy.org/calendar</a>
</footer>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const PROXY = 'https://api.allorigins.win/raw?url=';
const FEED  = 'https://www.summercourtacademy.org/events';

// Keywords used to identify relevant events from the full school calendar
const HOLIDAY_KEYWORDS   = ['holiday', 'holidays', 'half term', 'half-term', 'easter', 'christmas', 'summer'];
const INSET_KEYWORDS     = ['inset'];
const BANK_HOL_KEYWORDS  = ['bank holiday', 'bank hol', 'good friday', 'may day'];
const CLOSURE_KEYWORDS   = ['fair day', 'school closed', 'closed'];

// ── Date helpers ─────────────────────────────────────────────────────────────
function parseDate(str) {
  // Handles "2026-04-03" and "2026-04-03T00:00:00"
  const [y, m, d] = str.slice(0, 10).split('-').map(Number);
  return new Date(y, m - 1, d);
}

function today() {
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}

function daysBetween(a, b) {
  return Math.round((b - a) / 86400000);
}

function formatDate(str) {
  return parseDate(str).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function formatDateWithDay(str) {
  return parseDate(str).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
}

function formatDateRange(start, end) {
  if (start === end) return formatDate(start);
  return formatDate(start) + ' – ' + formatDate(end);
}

function formatDateRangeWithDay(start, end) {
  if (start === end) return formatDateWithDay(start);
  return formatDateWithDay(start) + ' – ' + formatDateWithDay(end);
}

// ── Academic year helpers ────────────────────────────────────────────────────
function currentAcademicStartYear() {
  const n = new Date();
  return n.getMonth() >= 8 ? n.getFullYear() : n.getFullYear() - 1;
}

function yearLabel(y) {
  return `${y}–${String(y + 1).slice(2)}`;
}

function yearRange(y) {
  return { start: `${y}-09-01`, end: `${y + 1}-08-31` };
}

// ── Event categorisation ─────────────────────────────────────────────────────
function categorise(title) {
  const t = title.toLowerCase();
  if (INSET_KEYWORDS.some(k => t.includes(k)))    return 'inset';
  if (BANK_HOL_KEYWORDS.some(k => t.includes(k))) return 'bank-holiday';
  if (HOLIDAY_KEYWORDS.some(k => t.includes(k)))  return 'holiday';
  if (CLOSURE_KEYWORDS.some(k => t.includes(k)))  return 'closure';
  return null; // Not a holiday/closure — skip
}

function typeLabel(type) {
  if (type === 'holiday')      return 'Holiday';
  if (type === 'inset')        return 'Inset Day';
  if (type === 'bank-holiday') return 'Bank Holiday';
  if (type === 'closure')      return 'Closure';
  return type;
}

// ── Term grouping ─────────────────────────────────────────────────────────────
function getTerm(startYear, dateStr) {
  const d = parseDate(dateStr);
  const m = d.getMonth() + 1; // 1-12
  const y = d.getFullYear();
  if (y === startYear && m >= 9)             return `Autumn ${startYear}`;
  if (y === startYear + 1 && m <= 4)         return `Spring ${startYear + 1}`;
  return `Summer ${startYear + 1}`;
}

const termOrder = y => [`Autumn ${y}`, `Spring ${y + 1}`, `Summer ${y + 1}`];

// ── Fetch ────────────────────────────────────────────────────────────────────
async function fetchEvents(startYear) {
  const { start, end } = yearRange(startYear);
  const url = `${FEED}?start=${start}&end=${end}`;
  const res = await fetch(PROXY + encodeURIComponent(url));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const raw = await res.json();
  // raw is an array of FullCalendar event objects
  return raw
    .map(e => {
      const type = categorise(e.title);
      if (!type) return null;
      // FullCalendar end dates are exclusive — subtract one day for display
      const endDate = e.end ? e.end.slice(0, 10) : e.start.slice(0, 10);
      const endDisplay = e.allDay && e.end
        ? (() => {
            const d = parseDate(endDate);
            d.setDate(d.getDate() - 1);
            return d.toISOString().slice(0, 10);
          })()
        : endDate;
      return {
        name:  e.title,
        start: e.start.slice(0, 10),
        end:   endDisplay,
        type,
        term:  getTerm(startYear, e.start.slice(0, 10)),
      };
    })
    .filter(Boolean)
    .sort((a, b) => parseDate(a.start) - parseDate(b.start));
}

// ── Render ────────────────────────────────────────────────────────────────────
const NOW = today();

function renderHeader(startYear, events) {
  // Term / holiday label
  let label = yearLabel(startYear) + ' Academic Year';
  for (const t of termOrder(startYear)) {
    // crude term date ranges — just label the current period
  }
  for (const e of events) {
    if (e.type === 'holiday' || e.type === 'bank-holiday') {
      if (NOW >= parseDate(e.start) && NOW <= parseDate(e.end)) {
        label = e.name;
        break;
      }
    }
  }
  // Check if in an active inset/closure day
  for (const e of events) {
    if (NOW >= parseDate(e.start) && NOW <= parseDate(e.end) && e.type !== 'holiday') {
      label = e.name;
      break;
    }
  }
  document.getElementById('term-label').textContent = label;
}

function renderCountdowns(events) {
  const wrap = document.getElementById('countdowns-wrap');
  wrap.innerHTML = '';

  const grid = document.createElement('div');
  grid.className = 'countdowns';

  const titleEl = document.createElement('div');
  titleEl.className = 'section-title';
  titleEl.style.gridColumn = '1/-1';
  titleEl.textContent = 'Coming up';
  grid.appendChild(titleEl);

  const upcoming = [];
  for (const e of events) {
    const s = parseDate(e.start);
    const en = parseDate(e.end);
    if (en < NOW) continue;
    if (s <= NOW) {
      upcoming.push({ ...e, status: 'ongoing', daysLeft: daysBetween(NOW, en) });
    } else {
      upcoming.push({ ...e, status: 'upcoming', daysUntil: daysBetween(NOW, s) });
    }
    if (upcoming.length >= 5) break;
  }

  if (!upcoming.length) {
    titleEl.textContent = 'No upcoming events this year';
    wrap.appendChild(grid);
    return;
  }

  for (const e of upcoming) {
    const cls = e.status === 'ongoing' ? 'ongoing' : e.type;
    const card = document.createElement('div');
    card.className = `countdown-card ${cls}`;

    let countdownHtml;
    if (e.status === 'ongoing') {
      countdownHtml = `<div class="card-countdown">${e.daysLeft}</div>
                       <div class="card-unit">day${e.daysLeft !== 1 ? 's' : ''} remaining</div>`;
    } else if (e.daysUntil === 0) {
      countdownHtml = `<div class="card-countdown">Today</div>`;
    } else if (e.daysUntil === 1) {
      countdownHtml = `<div class="card-countdown">Tomorrow</div>`;
    } else {
      countdownHtml = `<div class="card-countdown">${e.daysUntil}</div>
                       <div class="card-unit">days away</div>`;
    }

    card.innerHTML = `
      <div class="card-label">${e.status === 'ongoing' ? 'Ongoing' : typeLabel(e.type)}</div>
      <div class="card-name">${e.name}</div>
      <div class="card-date">${formatDateRangeWithDay(e.start, e.end)}</div>
      ${countdownHtml}
    `;
    grid.appendChild(card);
  }
  wrap.appendChild(grid);
}

function renderList(startYear, events) {
  const wrap = document.getElementById('list-wrap');
  wrap.innerHTML = '';

  const section = document.createElement('div');
  section.className = 'list-section';

  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = `${yearLabel(startYear)} Academic Year`;
  section.appendChild(title);

  for (const termName of termOrder(startYear)) {
    const termEvents = events.filter(e => e.term === termName);
    if (!termEvents.length) continue;

    const group = document.createElement('div');
    group.className = 'term-group';

    const heading = document.createElement('div');
    heading.className = 'term-heading';
    heading.textContent = termName;
    group.appendChild(heading);

    const pastEvents   = termEvents.filter(e => parseDate(e.end) < NOW);
    const futureEvents = termEvents.filter(e => parseDate(e.end) >= NOW);

    // Collapsed past events
    if (pastEvents.length) {
      const details = document.createElement('details');
      details.className = 'past-events';
      const summary = document.createElement('summary');
      summary.textContent = `${pastEvents.length} past event${pastEvents.length !== 1 ? 's' : ''}`;
      details.appendChild(summary);
      for (const e of pastEvents) {
        details.appendChild(makeRow(e, true));
      }
      group.appendChild(details);
    }

    // Today marker
    if (pastEvents.length && futureEvents.length) {
      const marker = document.createElement('div');
      marker.className = 'today-marker';
      marker.textContent = 'Upcoming';
      group.appendChild(marker);
    }

    // Upcoming events
    for (const e of futureEvents) {
      group.appendChild(makeRow(e, false));
    }

    section.appendChild(group);
  }
  wrap.appendChild(section);
}

function makeRow(e, isPast) {
  const s = parseDate(e.start);
  const en = parseDate(e.end);
  const isOngoing = !isPast && s <= NOW && en >= NOW;

  const row = document.createElement('div');
  row.className = `event-row ${e.type}${isPast ? ' past' : ''}`;
  const ongoingTag = isOngoing
    ? ' <span style="color:#2299dd;font-size:0.7rem;font-weight:700;">● now</span>'
    : '';
  row.innerHTML = `
    <div class="event-dot"></div>
    <div class="event-info">
      <div class="event-name">${e.name}${ongoingTag}</div>
      <div class="event-dates">${formatDateRange(e.start, e.end)}</div>
    </div>
    <div class="event-badge">${typeLabel(e.type)}</div>
  `;
  return row;
}

function showStatus(msg, isError = false) {
  document.getElementById('countdowns-wrap').innerHTML = '';
  document.getElementById('list-wrap').innerHTML =
    `<div class="status-msg${isError ? ' error' : ''}">${msg}</div>`;
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
const currentYear = currentAcademicStartYear();
document.getElementById('today-display').textContent =
  NOW.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

async function load(startYear) {
  document.getElementById('term-label').textContent = ' ';
  showStatus('<span class="spinner"></span> Loading calendar…');
  try {
    const events = await fetchEvents(startYear);
    if (!events.length) {
      showStatus('No holidays or inset days found for this year — the school may not have published them yet.');
      return;
    }
    renderHeader(startYear, events);
    renderCountdowns(events);
    renderList(startYear, events);
  } catch (err) {
    showStatus(
      `Could not load calendar data. Check your internet connection or visit ` +
      `<a href="https://www.summercourtacademy.org/calendar" target="_blank">summercourtacademy.org/calendar</a> directly.`,
      true
    );
    console.error(err);
  }
}

load(currentYear);
</script>
</body>
</html>
